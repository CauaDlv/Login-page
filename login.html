<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Library Login</title>
    
</head>
<body>
    <main class="login-card">
        <div class="top-area">
            <img src="Assets/Bonequinho_no_livro.svg" alt="Figure sitting on the book">
            <h1>Come read with us!</h1>
            <h2>Login please</h2>
        </div>
        <!-- Email area -->
        <div class="email-section">
            <span>Username</span>
            <form class="login-form">
                <fieldset>
                    <img src="Assets/User.svg" alt="user image" class="user">
                    <input type="text" placeholder="Enter your Username">
                </fieldset>
            </form>
        </div>
        <!-- Password area -->
        <div class="password-section">
            <span>Password</span>
            <form class="login-form">
                <fieldset>
                    <img src="Assets/Lock.svg" alt="lock image" class="lock">
                    <input type="password" placeholder="Enter your password">
                    <img src="Assets/eye.svg" alt="eye image" class="eye">
                </fieldset>
            </form>
            <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
        <!-- Login area -->
        <div class="login-area">
                <button class="login-button">Login</button>
            <span class="continue">Or continue with</span> 
            <button class="google-button"><img src="Assets/google.svg" alt="google" class="img-google">Google</button> <br>
            <button class="facebook-button"> <img src="Assets/facebook.svg" alt="facebook" class="img-facebook">Facebook</button> <br>
            <footer>
                <div class="footer-content">
                    <span class="question">Haven't any account?</span> <br>
                    <a href="#" class="register">Register now</a>
                </div>
            </footer>
        </div>
        
    </main>
</body>
</html>
